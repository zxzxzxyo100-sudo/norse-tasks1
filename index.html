<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Norse Task Manager — نظام إدارة المهام</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',sans-serif;background:#0f0e0c;color:#e8d9b0;min-height:100vh;overflow-x:hidden;}
input,select,textarea{color-scheme:dark;font-family:'Tajawal',sans-serif;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#0a0908;}
::-webkit-scrollbar-thumb{background:#3a3020;border-radius:3px;}
.app{display:flex;min-height:100vh;}
.sidebar{width:220px;background:#0a0908;border-left:1px solid rgba(201,168,76,0.12);display:flex;flex-direction:column;position:fixed;top:0;right:0;bottom:0;z-index:10;}
.sidebar-logo{padding:22px 18px 18px;border-bottom:1px solid rgba(201,168,76,0.1);display:flex;align-items:center;gap:10px;}
.sidebar-brand{color:#c9a84c;font-weight:700;font-size:18px;letter-spacing:0.08em;}
nav{flex:1;padding:8px 0;}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:12px 18px;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;text-align:right;transition:all 0.15s;}
.sidebar-user{padding:12px 14px;border-top:1px solid rgba(201,168,76,0.1);display:flex;align-items:center;gap:8px;}
.main{margin-right:220px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{padding:14px 28px;border-bottom:1px solid rgba(201,168,76,0.08);display:flex;justify-content:space-between;align-items:center;background:#0f0e0c;position:sticky;top:0;z-index:5;}
#notif{display:none;font-size:13px;padding:9px 28px;text-align:center;}
.content{flex:1;padding:28px;max-width:1100px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center;}
.modal-box{background:#141210;border:1px solid rgba(201,168,76,0.22);border-radius:14px;width:92%;max-width:500px;max-height:92vh;overflow:auto;}
.btn-gold{background:linear-gradient(135deg,#c9a84c,#a07830);color:#0e0d0b;border:none;border-radius:8px;padding:10px 20px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;}
.btn-ghost{background:transparent;color:#c9a84c;border:1px solid #c9a84c;border-radius:8px;padding:9px 16px;font-weight:600;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;}
.inp{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 13px;color:#e8d9b0;font-size:14px;outline:none;margin-bottom:14px;transition:border-color 0.2s;}
.inp:focus{border-color:rgba(201,168,76,0.5);}
.sel{width:100%;background:#1a1610;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 13px;color:#e8d9b0;font-size:13px;outline:none;margin-bottom:14px;}
.lbl{color:#6a6050;font-size:12px;display:block;margin-bottom:6px;}
.stat-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:18px 14px;}
.proj-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:18px;cursor:pointer;}
.task-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 14px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);margin-bottom:6px;cursor:pointer;transition:background 0.15s;}
.task-row:hover{background:rgba(255,255,255,0.045);}
.badge{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:600;}
.prog-bar{height:6px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width 0.7s;}
.section-title{color:#c9a84c;font-size:11px;font-weight:600;letter-spacing:0.12em;margin-bottom:12px;text-transform:uppercase;}
.modal-header{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center;}
.modal-body{padding:22px 24px;}
.close-btn{background:none;border:none;color:#5a5040;cursor:pointer;font-size:18px;line-height:1;}
.filter-btn{background:transparent;border:1px solid;border-radius:20px;padding:6px 13px;cursor:pointer;font-size:12px;font-family:'Tajawal',sans-serif;}
.empty{color:#4a4030;text-align:center;padding:60px;font-size:14px;}
.user-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:16px;position:relative;}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 60% 40%,#1a1508 0%,#0f0e0c 70%);}
.login-card{background:#141210;border:1px solid rgba(201,168,76,0.22);border-radius:18px;padding:44px 38px;width:100%;max-width:400px;}
.pw-wrap{position:relative;margin-bottom:14px;}
.pw-wrap .inp{margin-bottom:0;padding-left:42px;}
.pw-toggle{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#6a6050;cursor:pointer;font-size:15px;padding:0;}
.err-msg{color:#cc6a6a;font-size:12px;margin-bottom:10px;padding-right:4px;}
.login-tabs{display:flex;margin-bottom:24px;border:1px solid rgba(201,168,76,0.2);border-radius:8px;overflow:hidden;}
.login-tab{flex:1;padding:10px;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;transition:all 0.2s;}
.pw-strength{display:flex;gap:4px;margin-top:6px;margin-bottom:14px;}
.pw-strength-bar{height:3px;flex:1;border-radius:2px;background:rgba(255,255,255,0.08);transition:background 0.3s;}
@media(max-width:700px){
  .sidebar{width:170px;}
  .main{margin-right:170px;}
  .content{padding:16px;}
  .login-card{padding:28px 18px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen" style="display:none;">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:18px;">
      <svg width="52" height="52" viewBox="0 0 48 48" fill="none">
        <polygon points="24,4 44,36 4,36" fill="none" stroke="#c9a84c" stroke-width="2.2"/>
        <circle cx="24" cy="24" r="6" fill="#c9a84c" opacity="0.9"/>
        <line x1="24" y1="4" x2="24" y2="44" stroke="#c9a84c" stroke-width="1" opacity="0.25"/>
        <line x1="4" y1="36" x2="44" y2="36" stroke="#c9a84c" stroke-width="1" opacity="0.25"/>
      </svg>
    </div>
    <h1 style="color:#e8d9b0;font-size:22px;font-weight:700;text-align:center;margin-bottom:5px;">Norse Task Manager</h1>
    <p style="color:#c9a84c;font-size:11px;letter-spacing:0.18em;text-align:center;margin-bottom:30px;">نظام إدارة المهام</p>

    <div class="login-tabs">
      <button class="login-tab" id="tab-login" onclick="switchTab('login')">تسجيل الدخول</button>
      <button class="login-tab" id="tab-register" onclick="switchTab('register')">حساب جديد</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="form-login">
      <label class="lbl">اسم المستخدم</label>
      <input id="l-user" class="inp" type="text" placeholder="أدخل اسم المستخدم" autocomplete="username"/>
      <label class="lbl">كلمة المرور</label>
      <div class="pw-wrap">
        <input id="l-pass" class="inp" type="password" placeholder="أدخل كلمة المرور" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
        <button class="pw-toggle" onclick="togglePw('l-pass',this)" type="button">👁</button>
      </div>
      <div id="l-err" class="err-msg" style="display:none;"></div>
      <button class="btn-gold" onclick="doLogin()" style="width:100%;padding:13px;font-size:15px;margin-top:4px;">دخول</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="form-register" style="display:none;">
      <label class="lbl">الاسم الكامل *</label>
      <input id="r-name" class="inp" type="text" placeholder="الاسم الكامل"/>
      <label class="lbl">اسم المستخدم *</label>
      <input id="r-user" class="inp" type="text" placeholder="مثال: ahmed123"/>
      <label class="lbl">كلمة المرور *</label>
      <div class="pw-wrap">
        <input id="r-pass" class="inp" type="password" placeholder="8 أحرف على الأقل" oninput="checkStrength(this.value,'reg')"/>
        <button class="pw-toggle" onclick="togglePw('r-pass',this)" type="button">👁</button>
      </div>
      <div class="pw-strength" id="pw-strength-reg">
        <div class="pw-strength-bar" id="rps1"></div><div class="pw-strength-bar" id="rps2"></div>
        <div class="pw-strength-bar" id="rps3"></div><div class="pw-strength-bar" id="rps4"></div>
      </div>
      <label class="lbl">تأكيد كلمة المرور *</label>
      <div class="pw-wrap">
        <input id="r-pass2" class="inp" type="password" placeholder="أعد كتابة كلمة المرور"/>
        <button class="pw-toggle" onclick="togglePw('r-pass2',this)" type="button">👁</button>
      </div>
      <div id="r-err" class="err-msg" style="display:none;"></div>
      <p style="color:#5a5040;font-size:11px;margin-bottom:16px;line-height:1.8;">الحسابات الجديدة تحتاج موافقة المدير الأعلى قبل التفعيل.</p>
      <button class="btn-gold" onclick="doRegister()" style="width:100%;padding:13px;font-size:15px;">إنشاء الحساب</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div class="app" id="main-app" style="display:none;">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="26" height="26" viewBox="0 0 48 48" fill="none">
        <polygon points="24,4 44,36 4,36" fill="none" stroke="#c9a84c" stroke-width="2.5"/>
        <circle cx="24" cy="24" r="5" fill="#c9a84c"/>
      </svg>
      <span class="sidebar-brand">Norse</span>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-user" id="sidebar-user"></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div id="page-title" style="color:#e8d9b0;font-size:18px;font-weight:700;"></div>
      <div id="topbar-actions" style="display:flex;gap:10px;"></div>
    </div>
    <div id="notif"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box"></div>
</div>

<script>
// ── STORAGE ──────────────────────────────────────────────────────
const SK={users:'nt_users',projects:'nt_prj',tasks:'nt_tasks',session:'nt_sess',pending:'nt_pend'};
function lsG(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lsS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ── HASH ─────────────────────────────────────────────────────────
function hashPw(pw){
  let h=5381;
  for(let i=0;i<pw.length;i++) h=((h<<5)+h)^pw.charCodeAt(i);
  return 'h'+(h>>>0).toString(36)+pw.length.toString(36);
}

// ── SEED ─────────────────────────────────────────────────────────
const SEED_USERS=[
  {id:'u1',name:'أحمد الرشيد',username:'admin',pwHash:hashPw('admin123'),role:'super_admin',av:'أح',color:'#b8860b',active:true},
  {id:'u2',name:'سارة المنصور',username:'sara',pwHash:hashPw('sara123'),role:'manager',av:'سا',color:'#5a7a4a',managerId:null,active:true},
  {id:'u3',name:'خالد العمري',username:'khalid',pwHash:hashPw('khalid123'),role:'manager',av:'خا',color:'#4a6080',managerId:null,active:true},
  {id:'u4',name:'ليلى حسن',username:'layla',pwHash:hashPw('layla123'),role:'employee',av:'لي',color:'#8a5a40',managerId:'u2',active:true},
  {id:'u5',name:'عمر الزهراني',username:'omar',pwHash:hashPw('omar123'),role:'employee',av:'عم',color:'#6a5a8a',managerId:'u3',active:true},
];
const SEED_PROJECTS=[
  {id:'p1',name:'مشروع التحول الرقمي',desc:'تطوير البنية التحتية التقنية',createdBy:'u1',color:'#c9a84c',date:'2024-01-10'},
  {id:'p2',name:'مشروع التسويق الاستراتيجي',desc:'حملات التوعية والانتشار الرقمي',createdBy:'u1',color:'#5a7aa0',date:'2024-01-15'},
];
const SEED_TASKS=[
  {id:'t1',title:'تصميم قاعدة البيانات',desc:'إنشاء هيكل قاعدة البيانات',pid:'p1',to:'u2',by:'u1',status:'completed',pri:'high',due:'2024-02-01'},
  {id:'t2',title:'تطوير واجهة المستخدم',desc:'بناء الواجهة الأمامية للنظام',pid:'p1',to:'u4',by:'u2',status:'in_progress',pri:'high',due:'2024-02-15'},
  {id:'t3',title:'اختبار الأمان',desc:'فحص ثغرات النظام وتقوية الحماية',pid:'p1',to:'u2',by:'u1',status:'pending',pri:'medium',due:'2024-03-01'},
  {id:'t4',title:'التوثيق الفني',desc:'كتابة الوثائق التقنية للمشروع',pid:'p1',to:'u4',by:'u2',status:'pending',pri:'low',due:'2024-03-15'},
  {id:'t5',title:'تحليل السوق المستهدف',desc:'دراسة الجمهور المستهدف',pid:'p2',to:'u3',by:'u1',status:'completed',pri:'high',due:'2024-02-05'},
  {id:'t6',title:'إعداد محتوى التواصل الاجتماعي',desc:'كتابة وتصميم المحتوى للمنصات',pid:'p2',to:'u5',by:'u3',status:'in_progress',pri:'medium',due:'2024-02-20'},
  {id:'t7',title:'قياس مؤشرات الأداء',desc:'تتبع KPIs وتحليل النتائج',pid:'p2',to:'u3',by:'u1',status:'pending',pri:'medium',due:'2024-03-10'},
  {id:'t8',title:'تقرير الحملة الشهري',desc:'إعداد تقرير شامل لأداء الحملات',pid:'p2',to:'u5',by:'u3',status:'archived',pri:'low',due:'2024-01-31'},
];

let USERS    = lsG(SK.users)    || SEED_USERS;
let PROJECTS = lsG(SK.projects) || SEED_PROJECTS;
let TASKS    = lsG(SK.tasks)    || SEED_TASKS;
let PENDING  = lsG(SK.pending)  || [];
let CU       = lsG(SK.session)  || null;

if(!lsG(SK.users))    lsS(SK.users,USERS);
if(!lsG(SK.projects)) lsS(SK.projects,PROJECTS);
if(!lsG(SK.tasks))    lsS(SK.tasks,TASKS);
if(!lsG(SK.pending))  lsS(SK.pending,PENDING);

function save(){lsS(SK.users,USERS);lsS(SK.projects,PROJECTS);lsS(SK.tasks,TASKS);lsS(SK.pending,PENDING);}

// ── CONSTANTS ────────────────────────────────────────────────────
const ROLE_L={super_admin:'المدير الأعلى',manager:'مدير',employee:'موظف'};
const ST_L={pending:'معلّق',in_progress:'جارٍ',completed:'مكتمل',archived:'مؤرشف'};
const PR_L={low:'منخفضة',medium:'متوسطة',high:'عالية'};
const ST_C={pending:'#8a7a3a',in_progress:'#3a6a9a',completed:'#3a8a5a',archived:'#5a5a6a'};
const PR_C={low:'#5a7a3a',medium:'#8a7030',high:'#8a3030'};
const COLORS=['#b8860b','#5a7a4a','#4a6080','#8a5a40','#6a5a8a','#8a4a60','#4a7a7a','#7a6a3a','#6a3a8a','#3a7a5a'];

let PAGE='dashboard', taskFilter='all', taskSearch='';

// ── HELPERS ──────────────────────────────────────────────────────
const gu=id=>USERS.find(x=>x.id===id);
const gp=id=>PROJECTS.find(x=>x.id===id);
const nid=()=>'i'+Date.now()+Math.random().toString(36).slice(2,5);
function initials(n){const p=n.trim().split(' ');return p.length>=2?p[0][0]+p[1][0]:p[0].substring(0,2);}
function avt(us,sz=32){const fs=Math.round(sz*0.38);return`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${us.color};display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:${fs}px;font-weight:700;flex-shrink:0;">${us.av}</div>`;}
function badge(txt,c){return`<span class="badge" style="background:${c}30;color:${c};">${txt}</span>`;}
function notify(msg,err=false){const n=document.getElementById('notif');n.textContent=msg;n.style.display='block';n.style.background=err?'#3a1a1a':'#1a3a1a';n.style.color=err?'#cc7a7a':'#7acc7a';n.style.borderBottom=err?'1px solid rgba(200,100,100,0.15)':'1px solid rgba(100,200,100,0.15)';clearTimeout(n._t);n._t=setTimeout(()=>n.style.display='none',3000);}
function activeTasks(uid){const a=TASKS.filter(x=>x.status!=='archived');if(!uid)return a;const cu=gu(uid);if(cu.role==='super_admin')return a;if(cu.role==='manager')return a.filter(x=>x.to===uid||x.by===uid);return a.filter(x=>x.to===uid);}
function progress(pid){const t=TASKS.filter(x=>x.pid===pid&&x.status!=='archived');if(!t.length)return 0;return Math.round(t.filter(x=>x.status==='completed').length/t.length*100);}
function canCreate(cu){return cu.role!=='employee';}
function canArchive(cu,t){return cu.role==='super_admin'||(cu.role==='manager'&&t.by===cu.id);}
function canStatus(cu,t){return t.to===cu.id||cu.role!=='employee';}

// ── LOGIN UI ─────────────────────────────────────────────────────
function showLogin(){document.getElementById('login-screen').style.display='flex';document.getElementById('main-app').style.display='none';switchTab('login');}
function showApp(){document.getElementById('login-screen').style.display='none';document.getElementById('main-app').style.display='flex';render();}

function switchTab(tab){
  document.getElementById('form-login').style.display=tab==='login'?'':'none';
  document.getElementById('form-register').style.display=tab==='register'?'':'none';
  ['login','register'].forEach(t=>{
    const el=document.getElementById('tab-'+t);
    el.style.background=t===tab?'rgba(201,168,76,0.15)':'transparent';
    el.style.color=t===tab?'#c9a84c':'#6a6050';
  });
  document.getElementById('l-err').style.display='none';
  document.getElementById('r-err').style.display='none';
}

function togglePw(id,btn){const inp=document.getElementById(id);if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}else{inp.type='password';btn.textContent='👁';}}

function checkStrength(pw,prefix){
  let s=0;
  if(pw.length>=8)s++;
  if(/[a-zA-Z]/.test(pw))s++;
  if(/[0-9]/.test(pw))s++;
  if(/[^A-Za-z0-9]/.test(pw)||pw.length>=12)s++;
  const cols=['#8a3030','#8a5a30','#8a7a30','#3a8a5a'];
  for(let i=1;i<=4;i++){const el=document.getElementById(prefix+'ps'+i);if(el)el.style.background=i<=s?cols[s-1]:'rgba(255,255,255,0.08)';}
}

function showErr(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display='block';}

function doLogin(){
  const username=document.getElementById('l-user').value.trim().toLowerCase();
  const pw=document.getElementById('l-pass').value;
  if(!username||!pw){showErr('l-err','يرجى إدخال اسم المستخدم وكلمة المرور');return;}
  const user=USERS.find(u=>u.username===username);
  if(!user){showErr('l-err','اسم المستخدم غير موجود');return;}
  if(user.active===false){showErr('l-err','الحساب في انتظار موافقة المدير الأعلى');return;}
  if(user.pwHash!==hashPw(pw)){showErr('l-err','كلمة المرور غير صحيحة');return;}
  CU=user;lsS(SK.session,CU);PAGE='dashboard';showApp();
}

function doRegister(){
  const name=document.getElementById('r-name').value.trim();
  const username=document.getElementById('r-user').value.trim().toLowerCase();
  const pw=document.getElementById('r-pass').value;
  const pw2=document.getElementById('r-pass2').value;
  if(!name||!username||!pw){showErr('r-err','يرجى ملء جميع الحقول');return;}
  if(username.length<3){showErr('r-err','اسم المستخدم يجب أن يكون 3 أحرف على الأقل');return;}
  if(pw.length<8){showErr('r-err','كلمة المرور يجب أن تكون 8 أحرف على الأقل');return;}
  if(pw!==pw2){showErr('r-err','كلمتا المرور غير متطابقتين');return;}
  if(USERS.find(u=>u.username===username)||PENDING.find(u=>u.username===username)){showErr('r-err','اسم المستخدم محجوز، اختر اسماً آخر');return;}
  PENDING.push({id:nid(),name,username,pwHash:hashPw(pw),role:'employee',av:initials(name),color:COLORS[Math.floor(Math.random()*COLORS.length)],active:false,requestedAt:new Date().toISOString().split('T')[0]});
  save();
  document.getElementById('form-register').innerHTML=`
    <div style="text-align:center;padding:20px 0;">
      <div style="font-size:48px;margin-bottom:16px;color:#c9a84c;">✓</div>
      <div style="color:#7acc7a;font-size:16px;font-weight:600;margin-bottom:10px;">تم إرسال طلب التسجيل!</div>

      <label class="lbl">تأكيد كلمة المرور الجديدة</label>
      <div class="pw-wrap"><input id="cp-new2" class="inp" type="password" placeholder="أعد كتابة كلمة المرور الجديدة" style="margin-bottom:0;"/><button class="pw-toggle" onclick="togglePw('cp-new2',this)" type="button">👁</button></div>
      <div id="cp-err" class="err-msg" style="display:none;margin-top:8px;"></div>
      <button class="btn-gold" onclick="saveChangePw()" style="width:100%;padding:13px;font-size:14px;margin-top:16px;">حفظ كلمة المرور</button>
    </div>`);
}
function saveChangePw(){
  const old=document.getElementById('cp-old').value;
  const nw=document.getElementById('cp-new').value;
  const nw2=document.getElementById('cp-new2').value;
  const err=document.getElementById('cp-err');
  if(hashPw(old)!==CU.pwHash){err.textContent='كلمة المرور الحالية غير صحيحة';err.style.display='block';return;}
  if(nw.length<8){err.textContent='كلمة المرور الجديدة يجب أن تكون 8 أحرف على الأقل';err.style.display='block';return;}
  if(nw!==nw2){err.textContent='كلمتا المرور الجديدة غير متطابقتين';err.style.display='block';return;}
  USERS=USERS.map(u=>u.id===CU.id?{...u,pwHash:hashPw(nw)}:u);
  CU={...CU,pwHash:hashPw(nw)};lsS(SK.session,CU);save();
  closeModal();notify('تم تغيير كلمة المرور بنجاح ✓');
}

function renderTopbar(){
  const titles={dashboard:'لوحة التحكم',projects:'المشاريع',tasks:'المهام',archive:'الأرشيف',users:'إدارة المستخدمين',pending:'طلبات التسجيل'};
  document.getElementById('page-title').textContent=titles[PAGE]||'';

  if(!CU){act.innerHTML='';return;}
  let b='';
  if((PAGE==='tasks'||PAGE==='dashboard')&&canCreate(CU)) b+=`<button class="btn-gold" onclick="openNewTask()">+ مهمة جديدة</button>`;
  if((PAGE==='projects'||PAGE==='dashboard')&&CU.role==='super_admin') b+=`<button class="btn-ghost" onclick="openNewProject()" style="margin-right:6px;">+ مشروع جديد</button>`;
  if(PAGE==='users') b+=`<button class="btn-gold" onclick="openNewUser()">+ مستخدم جديد</button>`;

function renderContent(){
  const c=document.getElementById('content');
  if(PAGE==='dashboard'){renderDashboard(c);return;}
  if(PAGE==='projects') {renderProjects(c);return;}
  if(PAGE==='tasks')    {renderTasks(c);return;}
  if(PAGE==='archive')  {renderArchive(c);return;}
  if(PAGE==='users')    {renderUsers(c);return;}
  if(PAGE==='pending')  {renderPending(c);return;}
}

// ── PENDING ──────────────────────────────────────────────────────
function approvePending(id){
  const u=PENDING.find(x=>x.id===id);if(!u)return;
  const role=document.getElementById('role-'+id)?.value||'employee';
  USERS.push({...u,role,active:true,managerId:null});
  PENDING=PENDING.filter(x=>x.id!==id);
  save();notify(`تم قبول حساب ${u.name} بنجاح ✓`);render();
}
function rejectPending(id){
  const u=PENDING.find(x=>x.id===id);if(!u)return;
  PENDING=PENDING.filter(x=>x.id!==id);
  save();notify(`تم رفض طلب ${u.name}`);render();
}

function setModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal-overlay').style.display='flex';}

document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

function openTask(id){
  const t=TASKS.find(x=>x.id===id);if(!t)return;
  const as=gu(t.to),cr=gu(t.by),pr=gp(t.pid);
  const canS=canStatus(CU,t)&&t.status!=='archived';
  const canA=canArchive(CU,t)&&t.status!=='archived';
  setModal(`
    <div class="modal-header">
      <h3 style="color:#e8d9b0;font-size:15px;font-weight:700;">${t.title}</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="color:#6a6050;font-size:13px;line-height:1.8;margin-bottom:18px;">${t.desc||'—'}</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;">
        ${[['المشروع',pr?.name,'#c9a84c'],['المُسند إليه',as?.name,'#c9a84c'],['أُنشئ بواسطة',cr?.name,'#c9a84c'],['الاستحقاق',t.due,'#c9a84c'],['الحالة',ST_L[t.status],ST_C[t.status]],['الأولوية',PR_L[t.pri],PR_C[t.pri]]].map(([l,v,col])=>`
          <div style="background:rgba(255,255,255,0.03);border-radius:8px;padding:10px 12px;">
            <div style="color:#5a5040;font-size:11px;margin-bottom:4px;">${l}</div>
            <div style="color:${col};font-size:13px;font-weight:600;">${v||'—'}</div>
          </div>`).join('')}
      </div>
      ${canS?`
        <div style="margin-bottom:14px;">
          <div class="lbl" style="margin-bottom:8px;">تحديث الحالة:</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${['pending','in_progress','completed'].map(s=>`
              <button class="filter-btn" onclick="updateStatus('${t.id}','${s}')" style="border-color:${t.status===s?'#c9a84c':'rgba(201,168,76,0.2)'};color:${t.status===s?'#c9a84c':'#6a6050'};background:${t.status===s?'rgba(201,168,76,0.1)':'transparent'};">
                ${ST_L[s]}
              </button>`).join('')}
          </div>
        </div>`:''}
      ${canA?`<button onclick="archiveTask('${t.id}');closeModal();" style="width:100%;background:#1a1818;border:1px solid #3a3a4a;color:#6a6a7a;border-radius:8px;padding:10px;cursor:pointer;font-family:Tajawal,sans-serif;font-size:13px;margin-top:4px;">▣ أرشفة هذه المهمة</button>`:''}
    </div>`);
}

function openNewTask(){
  const assignable=USERS.filter(us=>{
    if(CU.role==='super_admin') return us.role==='manager'||us.role==='employee';
    if(CU.role==='manager') return us.role==='employee'&&us.managerId===CU.id;
    return false;
  });
  setModal(`
    <div class="modal-header">
      <h3 style="color:#e8d9b0;font-size:15px;font-weight:700;">مهمة جديدة</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <label class="lbl">عنوان المهمة *</label>
      <input id="nt-title" class="inp" placeholder="أدخل عنوان المهمة"/>
      <label class="lbl">الوصف</label>
      <textarea id="nt-desc" class="inp" rows="3" placeholder="وصف تفصيلي" style="resize:vertical;"></textarea>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div><label class="lbl">المشروع *</label><select id="nt-proj" class="sel">${PROJECTS.map(pr=>`<option value="${pr.id}">${pr.name}</option>`).join('')}</select></div>
        <div><label class="lbl">المُسند إليه *</label><select id="nt-to" class="sel"><option value="">اختر...</option>${assignable.map(us=>`<option value="${us.id}">${us.name}</option>`).join('')}</select></div>
        <div><label class="lbl">الأولوية</label><select id="nt-pri" class="sel">${Object.entries(PR_L).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select></div>
        <div><label class="lbl">تاريخ الاستحقاق</label><input id="nt-due" type="date" class="inp" style="margin-bottom:0;"/></div>
      </div>
      <button class="btn-gold" onclick="saveNewTask()" style="width:100%;padding:13px;font-size:14px;margin-top:16px;">حفظ المهمة</button>
    </div>`);
}
function saveNewTask(){
  const title=document.getElementById('nt-title').value.trim();
  const to=document.getElementById('nt-to').value;
  if(!title||!to){notify('يرجى ملء الحقول المطلوبة',true);return;}
  TASKS.push({id:nid(),title,desc:document.getElementById('nt-desc').value,pid:document.getElementById('nt-proj').value,to,by:CU.id,status:'pending',pri:document.getElementById('nt-pri').value,due:document.getElementById('nt-due').value});
  save();closeModal();notify('تم حفظ المهمة بنجاح ✓');renderContent();renderTopbar();
}

function openNewProject(){
  const clrs=['#c9a84c','#5a7aa0','#5a8a5a','#8a5a40','#6a5a8a','#8a5a6a'];
  setModal(`
    <div class="modal-header">
      <h3 style="color:#e8d9b0;font-size:15px;font-weight:700;">مشروع جديد</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <label class="lbl">اسم المشروع *</label><input id="np-name" class="inp" placeholder="اسم المشروع"/>
      <label class="lbl">الوصف</label><textarea id="np-desc" class="inp" rows="3" style="resize:vertical;"></textarea>
      <label class="lbl">لون المشروع</label>
      <div style="display:flex;gap:10px;margin-bottom:18px;">
        ${clrs.map((c,i)=>`<div id="pc${i}" onclick="selPrjColor(${i},'${c}')" style="width:26px;height:26px;border-radius:50%;background:${c};cursor:pointer;border:${i===0?'3px solid #fff':'3px solid transparent'};"></div>`).join('')}
      </div>
      <input type="hidden" id="np-color" value="${clrs[0]}"/>
      <button class="btn-gold" onclick="saveNewProject()" style="width:100%;padding:13px;font-size:14px;">إنشاء المشروع</button>
    </div>`);
}
function selPrjColor(i,c){document.getElementById('np-color').value=c;for(let j=0;j<6;j++){const el=document.getElementById('pc'+j);if(el)el.style.border='3px solid transparent';}document.getElementById('pc'+i).style.border='3px solid #fff';}
function saveNewProject(){
  const name=document.getElementById('np-name').value.trim();
  if(!name){notify('يرجى إدخال اسم المشروع',true);return;}
  PROJECTS.push({id:nid(),name,desc:document.getElementById('np-desc').value,color:document.getElementById('np-color').value,createdBy:CU.id,date:new Date().toISOString().split('T')[0]});
  save();closeModal();notify('تم إنشاء المشروع بنجاح ✓');renderContent();renderTopbar();
}

function openNewUser(){showUserForm(null);}
function openEditUser(id){showUserForm(gu(id));}
function showUserForm(ex){
  const isEdit=!!ex,mgrs=USERS.filter(x=>x.role==='manager');
  setModal(`
    <div class="modal-header">
      <h3 style="color:#e8d9b0;font-size:15px;font-weight:700;">${isEdit?'تعديل المستخدم':'مستخدم جديد'}</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <label class="lbl">الاسم الكامل *</label><input id="nu-name" class="inp" value="${ex?.name||''}" placeholder="الاسم الكامل"/>
      <label class="lbl">اسم المستخدم *</label><input id="nu-uname" class="inp" value="${ex?.username||''}" placeholder="مثال: ahmed123" ${isEdit?'readonly style="opacity:0.5;"':''}/>
      ${!isEdit?`<label class="lbl">كلمة المرور *</label><div class="pw-wrap"><input id="nu-pw" class="inp" type="password" placeholder="8 أحرف على الأقل" style="margin-bottom:0;"/><button class="pw-toggle" onclick="togglePw('nu-pw',this)" type="button">👁</button></div><div style="margin-bottom:14px;"></div>`:''}
      <label class="lbl">الدور *</label>
      <select id="nu-role" class="sel" onchange="toggleMgrField()">
        <option value="manager" ${ex?.role==='manager'?'selected':''}>مدير</option>
        <option value="employee" ${ex?.role==='employee'?'selected':''}>موظف</option>
      </select>
      <div id="mgr-field" style="${ex?.role==='employee'||!ex?'':'display:none'}">
        <label class="lbl">المدير المسؤول</label>
        <select id="nu-mgr" class="sel"><option value="">بدون مدير</option>${mgrs.map(m=>`<option value="${m.id}" ${ex?.managerId===m.id?'selected':''}>${m.name}</option>`).join('')}</select>
      </div>
      <label class="lbl">لون الأفاتار</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;">
        ${COLORS.map((c,i)=>`<div id="uc${i}" onclick="selUsrColor(${i},'${c}')" style="width:24px;height:24px;border-radius:50%;background:${c};cursor:pointer;border:${(ex?.color===c||(i===0&&!ex))?'3px solid #fff':'3px solid transparent'};"></div>`).join('')}
      </div>
      <input type="hidden" id="nu-color" value="${ex?.color||COLORS[0]}"/>
      <div id="nu-err" class="err-msg" style="display:none;"></div>
      <button class="btn-gold" onclick="${isEdit?`saveEditUser('${ex.id}')`:'saveNewUser()'}" style="width:100%;padding:13px;font-size:14px;">${isEdit?'حفظ التعديلات':'إضافة المستخدم'}</button>
    </div>`);
}
function toggleMgrField(){const role=document.getElementById('nu-role').value;const mf=document.getElementById('mgr-field');if(mf)mf.style.display=role==='employee'?'':'none';}
function selUsrColor(i,c){document.getElementById('nu-color').value=c;for(let j=0;j<COLORS.length;j++){const el=document.getElementById('uc'+j);if(el)el.style.border='3px solid transparent';}document.getElementById('uc'+i).style.border='3px solid #fff';}
function saveNewUser(){
  const name=document.getElementById('nu-name').value.trim();
  const username=document.getElementById('nu-uname').value.trim().toLowerCase();
  const pw=document.getElementById('nu-pw')?.value||'';
  const role=document.getElementById('nu-role').value;
  const color=document.getElementById('nu-color').value;
  const mgr=document.getElementById('nu-mgr')?.value||null;
  const err=document.getElementById('nu-err');
  if(!name||!username){err.textContent='يرجى ملء الحقول المطلوبة';err.style.display='block';return;}
  if(pw.length<8){err.textContent='كلمة المرور يجب أن تكون 8 أحرف على الأقل';err.style.display='block';return;}
  if(USERS.find(u=>u.username===username)){err.textContent='اسم المستخدم محجوز';err.style.display='block';return;}
  USERS.push({id:nid(),name,username,pwHash:hashPw(pw),role,av:initials(name),color,managerId:role==='employee'?mgr:null,active:true});
  save();closeModal();notify('تم إضافة المستخدم بنجاح ✓');renderContent();renderTopbar();
}
function saveEditUser(id){
  const name=document.getElementById('nu-name').value.trim();
  const role=document.getElementById('nu-role').value;
  const color=document.getElementById('nu-color').value;
  const mgr=document.getElementById('nu-mgr')?.value||null;
  const err=document.getElementById('nu-err');
  if(!name){err.textContent='يرجى إدخال الاسم';err.style.display='block';return;}
  USERS=USERS.map(u=>u.id===id?{...u,name,role,av:initials(name),color,managerId:role==='employee'?mgr:null}:u);
  if(CU&&CU.id===id){CU=gu(id);lsS(SK.session,CU);}
  save();closeModal();notify('تم تحديث البيانات بنجاح ✓');render();
}

function archiveTask(id){TASKS=TASKS.map(t=>t.id===id?{...t,status:'archived'}:t);save();notify('تم أرشفة المهمة ✓');renderContent();}
function updateStatus(id,st){TASKS=TASKS.map(t=>t.id===id?{...t,status:st}:t);save();notify('تم تحديث الحالة ✓');closeModal();renderContent();}

// ── INIT ─────────────────────────────────────────────────────────
if(CU&&USERS.find(u=>u.id===CU.id&&u.active!==false)){showApp();}
else{CU=null;lsS(SK.session,null);showLogin();}
</script>
</body>
</html>
